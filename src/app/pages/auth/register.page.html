<section class="page-shell">
  <h1 class="title">Register</h1>
  <p class="subtitle">Create an account to test activation flow.</p>

  <form class="basic-form" (ngSubmit)="submit()">
    <label for="firstName">First name</label>
    <input
      id="firstName"
      name="firstName"
      type="text"
      [(ngModel)]="firstName"
      required
      autocomplete="given-name"
    />

    <label for="lastName">Last name</label>
    <input
      id="lastName"
      name="lastName"
      type="text"
      [(ngModel)]="lastName"
      required
      autocomplete="family-name"
    />

    <label for="email">Email</label>
    <input
      id="email"
      name="email"
      type="email"
      [(ngModel)]="email"
      required
      autocomplete="email"
    />

    <label for="password">Password</label>
    <input
      id="password"
      name="password"
      type="password"
      [(ngModel)]="password"
      required
      autocomplete="new-password"
    />

    <label for="dateOfBirth">Date of birth</label>
    <input
      id="dateOfBirth"
      name="dateOfBirth"
      type="date"
      [(ngModel)]="dateOfBirth"
      required
    />

    <button type="submit" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Registering...' : 'Register' }}
    </button>
  </form>

  <p><a routerLink="/login">Back to login</a></p>
  <p><a routerLink="/login/activate">Already have a code? Activate</a></p>

  @if (errorMessage()) {
  <p class="error-text">{{ errorMessage() }}</p>
  } @if (successMessage()) {
  <p class="success-text">{{ successMessage() }}</p>
  }
</section>

<section class="page-shell">
  <h1 class="title">State demo</h1>
  <p class="subtitle">Basic button + signal state counter demo page.</p>
  <a class="cta" routerLink="/login">Back to login</a>
  <button type="button" (click)="logout()">Logout</button>
</section>

<section class="counter-card">
  <h2>Counter</h2>
  <p>{{ store.counter() }}</p>
  <div class="counter-container">
    <button type="button" (click)="store.decrement()">Decrement</button>
    <button type="button" (click)="store.increment()">Increment</button>
    <button type="button" (click)="store.resetCounter()">Reset</button>
  </div>
</section>

<section class="items-card">
  <h2>Items</h2>
  <label for="new-item-label">New item</label>
  <input id="new-item-label" type="text" #itemLabel />
  <button type="button" (click)="addItem(itemLabel)">Add item</button>
  <ul>
    @for (item of store.items(); track item.id) {
    <li>
      {{ item.label }}
      <button type="button" (click)="store.removeItem(item.id)">Remove</button>
    </li>
    }
  </ul>
</section>

<section class="snapshot-card">
  <h2>Derived snapshot</h2>
  <pre>{{ store.debugSnapshot() }}</pre>
</section>

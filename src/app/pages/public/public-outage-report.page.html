<section class="panel">
  <h1>Report an outage (anonymous)</h1>
  <p>No login required. Operators review unpublished submissions.</p>

  <nav>
    <a routerLink="/login">Staff login</a>
    |
    <a routerLink="/client/dashboard">Client portal</a>
  </nav>

  @if (successMessage(); as msg) {
  <p role="status">{{ msg }}</p>
  }

  <label for="title">Title</label>
  <input id="title" [(ngModel)]="title" />

  <label for="desc">What happened?</label>
  <textarea id="desc" [(ngModel)]="description"></textarea>

  <label for="otype">Type</label>
  <select id="otype" [(ngModel)]="outageType">
    @for (label of typeLabels; track $index) {
    <option [ngValue]="$index">{{ label }}</option>
    }
  </select>

  <label for="severity">Severity</label>
  <select id="severity" [(ngModel)]="severity">
    @for (label of severityLabels; track $index) {
    <option [ngValue]="$index">{{ label }}</option>
    }
  </select>

  <label for="postal">Postal code</label>
  <input id="postal" [(ngModel)]="postalCode" />

  <label for="area">Area</label>
  <input id="area" [(ngModel)]="areaLabel" />

  <label for="street">Street</label>
  <input id="street" [(ngModel)]="street" />

  <label for="email">Contact email (optional)</label>
  <input id="email" type="email" [(ngModel)]="contactEmail" />

  <p>
    <button type="button" [disabled]="submitting()" (click)="submit()">
      Submit report
    </button>
  </p>
</section>
